services:
  api:
    build: .
    container_name: recommender_api
    ports:
      - "8000:8000"
    volumes:
      # Mount your real CSVs here — the container will use them instead of the bundled sample data.
      # Comment this section out if you just want to run with the built-in sample data.
      - ./data:/app/data:ro
    environment:
      DATA_DIR: data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s